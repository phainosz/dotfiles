---
- name: Include distro-specific package installs
  include_tasks: "{{ ansible_facts['distribution'] | lower }}.yml"
  when: ansible_facts['distribution'] is defined

- name: Ask if Neovim should be installed
  pause:
    prompt: "Do you want to install Neovim from source? (yes/no)"
  register: install_nvim_choice

- name: Include Neovim installation
  include_tasks: neovim.yml
  when: install_nvim_choice.user_input | lower == "yes"

---
# -------------------------
# System tasks (require root)
# -------------------------
- name: Update OS
  dnf:
    update_cache: yes
    name: "*"
    state: latest
  become: true

- name: Install Fedora free and nonfree repositories
  dnf:
    name:
      - "https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-{{ ansible_facts['distribution_major_version'] }}.noarch.rpm"
      - "https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-{{ ansible_facts['distribution_major_version'] }}.noarch.rpm"
    state: present
  become: true

- name: Install general packages
  dnf:
    name:
      - qbittorrent
      - vlc
      - git
      - zsh
    state: present
  become: true

- name: Install GNOME tweaks and extensions
  dnf:
    name:
      - gnome-tweaks
      - gnome-extensions-app
    state: present
  become: true

- name: Install ffmpeg (replaces ffmpeg-free if needed)
  dnf:
    name: ffmpeg
    state: present
    allowerasing: yes
  become: true

# -------------------------
# Install Go (specific version)
# -------------------------

- name: Remove existing Go installation
  file:
    path: /usr/local/go
    state: absent
  become: true

- name: Download Go tar to playbook directory
  get_url:
    url: "https://go.dev/dl/go{{ go_version }}.linux-amd64.tar.gz"
    dest: "{{ playbook_dir }}/go{{ go_version }}.linux-amd64.tar.gz"
    mode: "0644"
  become: false

- name: Extract Go to /usr/local
  unarchive:
    src: "{{ playbook_dir }}/go{{ go_version }}.linux-amd64.tar.gz"
    dest: /usr/local
    remote_src: yes
  become: true

- name: Ensure Go is in PATH globally
  copy:
    dest: /etc/profile.d/go.sh
    content: |
      export PATH=$PATH:/usr/local/go/bin
    mode: "0755"
  become: true

- name: Remove downloaded Go tarball
  file:
    path: "{{ playbook_dir }}/go{{ go_version }}.linux-amd64.tar.gz"
    state: absent
  become: false

# -------------------------
# User-level tasks (normal user)
# -------------------------
- block:
    # Git configuration
    - name: Configure git username
      git_config:
        name: user.name
        value: "{{ git_user }}"
        scope: global

    - name: Configure git email
      git_config:
        name: user.email
        value: "{{ git_email }}"
        scope: global

    # SSH
    - name: Ensure SSH directory exists
      file:
        path: "{{ ansible_env.HOME }}/.ssh"
        state: directory
        mode: "0700"

    - name: Generate SSH key
      openssh_keypair:
        path: "{{ ansible_env.HOME }}/.ssh/id_ed25519"
        type: ed25519
        comment: "{{ git_email }}"
        state: present
        mode: "0600"

    # Zed
    - name: Install Zed
      shell: curl -f https://zed.dev/install.sh | sh
      args:
        creates: "{{ ansible_env.HOME }}/.local/bin/zed"

    - name: Ensure Zed config directory exists
      file:
        path: "{{ ansible_env.HOME }}/.config/zed"
        state: directory

    - name: Remove existing Zed files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ ansible_env.HOME }}/.config/zed/settings.json"
        - "{{ ansible_env.HOME }}/.config/zed/keymap.json"

    - name: Symlink Zed settings.json
      file:
        src: "{{ playbook_dir }}/common/zed/settings.json"
        dest: "{{ ansible_env.HOME }}/.config/zed/settings.json"
        state: link
        force: true

    - name: Symlink Zed keymap.json
      file:
        src: "{{ playbook_dir }}/common/zed/keymap.json"
        dest: "{{ ansible_env.HOME }}/.config/zed/keymap.json"
        state: link
        force: true

    # VSCode
    - name: Remove existing VSCode config
      file:
        path: "{{ ansible_env.HOME }}/.config/Code/User"
        state: absent

    - name: Symlink VSCode config
      file:
        src: "{{ playbook_dir }}/common/vscode"
        dest: "{{ ansible_env.HOME }}/.config/Code/User"
        state: link
        force: true

    # IdeaVim
    - name: Remove existing .ideavimrc
      file:
        path: "{{ ansible_env.HOME }}/.ideavimrc"
        state: absent

    - name: Symlink .ideavimrc
      file:
        src: "{{ playbook_dir }}/common/.ideavimrc"
        dest: "{{ ansible_env.HOME }}/.ideavimrc"
        state: link
        force: true

    # SDKMAN
    - name: Install SDKMAN
      shell: curl -s "https://get.sdkman.io" | bash
      args:
        creates: "{{ ansible_env.HOME }}/.sdkman/bin/sdk"

    # Input completion ignore case
    - name: Set inputrc completion-ignore-case
      lineinfile:
        path: "{{ ansible_env.HOME }}/.inputrc"
        line: "set completion-ignore-case on"
        create: yes
  become: false
